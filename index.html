    function addRow() {
        const itemList = document.getElementById('itemList');
        const newRow = document.createElement('div');
        newRow.className = 'item-row';
        newRow.innerHTML = `
            <select class="item-name">${itemOptions}</select>
            <input type="number" class="item-qty" placeholder="數量" min="1" value="1">
            <button type="button" class="btn btn-remove" onclick="removeRow(this)">刪除</button>
        `;
        itemList.appendChild(newRow);
    }

    function removeRow(btn) { 
        const rows = document.querySelectorAll('.item-row');
        if (rows.length > 1) { btn.parentElement.remove(); }
        else { alert("申請單需至少保留一項用品。"); }
    }

    async function submitForm() {
        const name = document.getElementById('userName').value;
        const dept = document.getElementById('department').value;
        const items = [];
        
        document.querySelectorAll('.item-row').forEach(row => {
            const itemName = row.querySelector('.item-name').value;
            const itemQty = row.querySelector('.item-qty').value;
            if (itemName && itemQty) {
                // 這裡的 itemName 已經包含單位了，例如 "紙 (包)"
                items.push({ name: itemName, qty: itemQty });
            }
        });

        if (!name || !dept || items.length === 0) { 
            alert("請完整填寫姓名、部門並選擇項目。"); 
            return; 
        }

        const scriptUrl = 'https://script.google.com/macros/s/AKfycbx0zp5tqdg-frvgbK2_zXYh60BsdIqi-oCU8om3DyRWS5dB9mwg6-F9asZr5WRiGYHw/exec'; 

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "傳送中...";

        try {
            await fetch(scriptUrl, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({ name, dept, items }) 
            });
            alert("申請已成功送出！通知已寄送至林昆霖信箱。");
            location.reload();
        } catch (e) {
            alert("錯誤：" + e);
            btn.disabled = false;
        }
    }
</script>
